<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LETS FIND!!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg1:#0f172a;
      --bg2:#041631;
      --bg3:#0b1020;
      --card: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.18);
      --field: rgba(255,255,255,0.12);
      --fieldBorder: rgba(255,255,255,0.20);
      --text:#f8fafc;
      --muted: rgba(226,232,240,0.80);
      --primary:#6366f1;
      --success:#22c55e;
      --danger:#ef4444;
    }

    body{
      margin:0;
      font-family:"Poppins", sans-serif;
      min-height:100vh;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(99,102,241,0.28), transparent 55%),
                  radial-gradient(900px 500px at 85% 25%, rgba(34,197,94,0.20), transparent 60%),
                  linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
    }

    .shell{
      width:100%;
      max-width: 980px;
    }

    /* Top bar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      color: var(--text);
      font-weight:800;
      letter-spacing:1px;
      font-size: 16px;
    }

    .logo{
      width:34px;
      height:34px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(99,102,241,0.95), rgba(34,197,94,0.75));
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .top-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .pill{
      font-size: 12px;
      font-weight: 600;
      color: rgba(226,232,240,0.85);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      white-space: nowrap;
    }

    .link-btn{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 9px 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      transition: transform .08s ease, opacity .2s ease, background .2s ease;
    }

    .link-btn:hover{ opacity:0.95; background: rgba(255,255,255,0.12); }
    .link-btn:active{ transform: scale(0.98); }

    .link-btn.primary{
      background: rgba(99,102,241,0.22);
      border-color: rgba(99,102,241,0.45);
    }

    /* Main grid */
    .grid{
      display:grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
    }
    .side-widget video{
  width:220px;
  border-radius:12px;
  background:rgb(33,46,67);
}

    .panel{
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
      padding: 20px;
      color: var(--text);
    }

    .hero h1{
      margin: 0 0 6px 0;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-shadow: 0 6px 22px rgba(0,0,0,0.45);
    }
    .hero p{
      margin: 0;
      color: rgba(226,232,240,0.85);
      line-height: 1.5;
      font-size: 13px;
    }

    .hero ul{
      margin: 14px 0 0 0;
      padding-left: 18px;
      color: rgba(226,232,240,0.85);
      font-size: 13px;
      line-height: 1.7;
    }

    .form h2{
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }

    label{
      display:block;
      margin-top: 12px;
      color: rgba(226,232,240,0.9);
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    input{
      width:100%;
      margin-top: 6px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--fieldBorder);
      outline:none;
      background: var(--field);
      color: var(--text);
      font-size: 14px;
    }
    input::placeholder{ color: rgba(255,255,255,0.55); }

    input:focus{
      border-color: rgba(99,102,241,0.9);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.25);
    }

    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .msg{
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      display:none;
      font-size: 13px;
      font-weight: 600;
    }
    .msg.ok{
      display:block;
      background: rgba(34,197,94,0.18);
      border: 1px solid rgba(34,197,94,0.35);
      color: #dcfce7;
    }
    .msg.err{
      display:block;
      background: rgba(239,68,68,0.18);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fee2e2;
    }

    .actions{
      margin-top: 16px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn{
      border:none;
      padding: 12px 14px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 800;
      font-size: 14px;
      transition: transform .08s ease, opacity .2s ease;
    }
    .btn:active{ transform: scale(0.98); }
    .btn:hover{ opacity: 0.95; }

    .btn-create{ background: var(--success); color: #052e16; }
    .btn-reset{
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(226,232,240,0.95);
    }

    .hint{
      margin-top: 10px;
      text-align:center;
      color: rgba(226,232,240,0.75);
      font-size: 12px;
    }

    /* Password */
    .pwd-wrap{ position:relative; }
    .pwd-toggle{
      position:absolute;
      right:10px;
      top:15px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.10);
      color: rgba(226,232,240,0.95);
      cursor:pointer;
      font-size: 12px;
      font-weight: 700;
    }
    .pwd-toggle:hover{ opacity:0.9; }

    .small{
      margin-top: 8px;
      font-size: 12px;
      color: rgba(226,232,240,0.72);
      text-align:center;
    }

    
  </style>
</head>

<body>
  <div class="shell">
   


    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        LETS FIND!!
      </div>

      <div class="top-actions">
        
      </div>
    </div>

    <div class="grid">
      <!-- Left: hero -->
      <div class="panel hero">
        <h1></h1>
        <p>
          !!Find the Scammers!!
        </p>

        <ul>
          <li><b>Just Enter phone number or email</b></li>
          <li><b>Click on comments and verify the result</b></li>
          <li><b>Check the F-Score</b></li>
        </ul>

        <div class="side-widget">
        <video autoplay muted loop playsinline>
        <source src="F_Score.mov" type="video/mp4">
       </video>
      </div>

      </div>

      <!-- Right: form -->
      <div class="panel form">
        <h2>Create New Account</h2>

        <div class="row">
          <div>
            <label>First Name</label>
            <input id="firstName" type="text" placeholder="Enter First Name" />
          </div>
          <div>
            <label>Last Name</label>
            <input id="lastName" type="text" placeholder="Enter Last Name" />
          </div>
        </div>

        <label>Phone Number</label>
        <input
          id="phone"
          type="text"
          inputmode="numeric"
          maxlength="10"
          placeholder="Enter 10 digit phone number"
        />

        <label>Gmail</label>
        <input
          id="gmail"
          type="text"
          placeholder="abc@gmail.com"
        />

        <label>Password</label>
        <div class="pwd-wrap">
        <input id="password" type="password" placeholder="Enter password">

          <button id="togglePwd" class="pwd-toggle" type="button">Show</button>
        </div>

        <div id="message" class="msg"></div>

        <div class="actions">
          <button id="createBtn" class="btn btn-create" type="button">Create</button>
          <a class="link-btn primary" href="Sign_Page.html">Sign Up</a>

        </div>

        <div class="hint">
          Phone must be exactly 10 digits • Gmail must end with @gmail.com • Password: 8+ chars with letter+number+symbol
        </div>
      </div>
    </div>
  </div>

  <script>
    const phoneEl = document.getElementById("phone");
    const gmailEl = document.getElementById("gmail");
    const pwdEl   = document.getElementById("password");
    const msgEl   = document.getElementById("message");
    const togglePwdBtn = document.getElementById("togglePwd");

    function showMsg(text, type) {
      msgEl.className = "msg " + (type === "ok" ? "ok" : "err");
      msgEl.textContent = text;
    }
      const input=document.getElementById("userInput");
const password=document.getElementById("password");
const msg=document.getElementById("message");
const toggle=document.getElementById("togglePwd");

function showMsg(text,type){
  msg.style.display="block";
  msg.className="msg "+type;
  msg.textContent=text;
}

/* SHOW PASSWORD */
toggle.addEventListener("click",()=>{
  password.type=password.type==="password"?"text":"password";
  toggle.textContent=password.type==="password"?"Show":"Hide";
});

    // Phone: only digits + max 10
    phoneEl.addEventListener("input", function () {
      this.value = this.value.replace(/[^0-9]/g, "");
      if (this.value.length > 10) this.value = this.value.slice(0, 10);
    });

    // Gmail: allow only common characters while typing
    gmailEl.addEventListener("input", function () {
      this.value = this.value.replace(/[^a-zA-Z0-9.@_]/g, "");
    });

    function isValidGmail(gmail) {
      return /^[a-zA-Z0-9._]+@gmail\.com$/.test(gmail);
    }

    // Password: 8+ chars, at least 1 letter, 1 number, 1 symbol
    function isValidPassword(pwd) {
      return /^(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(pwd);
    }

    // Show password rule when user clicks password box
    pwdEl.addEventListener("focus", function () {
      showMsg("Password must be 8+ characters and include letters + numbers + symbols (Example: Abc@1234).", "err");
    });
